<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Rubik Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Mặc định màu sắc */
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #4CAF50;
            --timer-font: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--timer-font);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Hiệu ứng mượt mà khi hiện lại giao diện */
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Class dùng để ẩn giao diện ngay lập tức khi đang giải */
        .hidden-instant { opacity: 0 !important; pointer-events: none !important; visibility: hidden !important; transition: none !important; }

        /* Vùng UI tổng */
        #ui-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* SCRAMBLE & HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            min-height: 80px;
        }
        #scramble-display {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
            padding: 0 20px;
            letter-spacing: 2px;
            line-height: 1.4;
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        .icon-btn:hover { opacity: 1; color: var(--accent-color); }

        /* TIMER AREA */
        #timer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
        }
        #timer {
            font-size: 10vw;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            letter-spacing: -2px;
            transition: color 0.1s ease, text-shadow 0.3s ease;
            cursor: pointer;
        }
        /* Hiệu ứng trạng thái */
        .state-red { color: #f44336 !important; }
        .state-green { color: var(--accent-color) !important; }
        .state-warning { color: #ff9800 !important; animation: blinkWarning 0.5s infinite alternate; }
        .pb-anim { animation: pbPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--accent-color); text-shadow: 0 0 20px var(--accent-color); }
        .idle-anim { animation: idleGlow 4s infinite alternate; }

        @keyframes blinkWarning { from { opacity: 1; } to { opacity: 0.3; } }
        @keyframes pbPop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes idleGlow {
            0% { text-shadow: 0 0 10px transparent; }
            100% { text-shadow: 0 0 30px rgba(255,255,255,0.15); }
        }

        /* BOTTOM STATS & HISTORY */
        .bottom-section {
            display: flex;
            gap: 20px;
            margin-top: auto;
            max-height: 35vh;
        }
        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 1.1rem; }
        .stat-item span { font-weight: 800; color: var(--accent-color); float: right;}
        
        .history-list { list-style: none; font-family: monospace; font-size: 1rem; }
        .history-item { 
            display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); 
            align-items: center; cursor: pointer; transition: 0.2s;
        }
        .history-item:hover { background: rgba(255,255,255,0.1); }
        .h-index { opacity: 0.5; width: 30px; }
        .h-time { font-weight: bold; flex: 1; }
        .h-ao5, .h-ao12 { opacity: 0.7; width: 60px; text-align: right; }
        
        /* Tooltip Scramble cho History */
        .history-item[title] { position: relative; }

        /* Menu Hành động khi click vào History */
        .history-actions { display: flex; gap: 5px; }
        .history-actions button {
            background: rgba(255,255,255,0.1); border: none; color: var(--text-color);
            padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
        }
        .history-actions button:hover { background: var(--accent-color); }
        .history-actions .btn-del:hover { background: #f44336; }

        /* SETTINGS MODAL */
        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #settings-modal.active { opacity: 1; pointer-events: auto; }
        .settings-content {
            background: #1e1e1e; padding: 30px; border-radius: 16px;
            width: 90%; max-width: 400px; color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .settings-content h2 { margin-bottom: 20px; text-align: center; color: var(--accent-color); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .setting-row label { font-size: 1.1rem; }
        input[type="color"] {
            border: none; border-radius: 4px; width: 30px; height: 30px; cursor: pointer;
            background: none; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        #close-settings {
            width: 100%; padding: 10px; margin-top: 15px; border: none;
            background: var(--accent-color); color: #fff; font-weight: bold;
            border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.2s;
        }
        #close-settings:hover { opacity: 0.8; }

        @media (max-width: 768px) {
            .bottom-section { flex-direction: column; }
            #timer { font-size: 20vw; }
            .header { min-height: 100px; }
            #scramble-display { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="timer-container">
        <div id="timer" class="idle-anim">0.00</div>
    </div>

    <div id="ui-wrapper">
        <div class="header">
            <div id="scramble-display">Loading scramble...</div>
            <button id="settings-btn" class="icon-btn">⚙️</button>
        </div>

        <div style="flex:1;"></div>

        <div class="bottom-section">
            <div class="panel stats-panel">
                <div class="stats-grid">
                    <div class="stat-item">Solves: <span id="stat-count">0</span></div>
                    <div class="stat-item">Best: <span id="stat-best">-</span></div>
                    <div class="stat-item">ao5: <span id="stat-ao5">-</span></div>
                    <div class="stat-item">ao12: <span id="stat-ao12">-</span></div>
                </div>
            </div>
            
            <div class="panel history-panel">
                <ul class="history-list" id="history-list">
                    <!-- JS sẽ render history ở đây -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="settings-content">
            <h2>Cài Đặt</h2>
            <div class="setting-row">
                <label>Bật Inspect (15s)</label>
                <label class="switch"><input type="checkbox" id="set-inspect"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <label>Ẩn thời gian khi giải</label>
                <label class="switch"><input type="checkbox" id="set-hide-timer"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <label>Hiệu ứng Idle</label>
                <label class="switch"><input type="checkbox" id="set-idle-anim"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <label>Màu nền</label>
                <input type="color" id="set-bg-color">
            </div>
            <div class="setting-row">
                <label>Màu chữ</label>
                <input type="color" id="set-text-color">
            </div>
            <div class="setting-row">
                <label>Màu nhấn (Accent)</label>
                <input type="color" id="set-accent-color">
            </div>
            <button id="close-settings">Đóng</button>
        </div>
    </div>

    <script>
        // Lấy các Elements
        const timerEl = document.getElementById('timer');
        const uiWrapper = document.getElementById('ui-wrapper');
        const scrambleDisplay = document.getElementById('scramble-display');
        const historyList = document.getElementById('history-list');
        const statsObj = { count: document.getElementById('stat-count'), best: document.getElementById('stat-best'), ao5: document.getElementById('stat-ao5'), ao12: document.getElementById('stat-ao12') };
        
        // --- LOGIC CÀI ĐẶT (SETTINGS) ---
        let settings = {
            inspect: true, hideTimer: false, idleAnim: true,
            bgColor: '#121212', textColor: '#ffffff', accentColor: '#4CAF50'
        };

        function loadSettings() {
            const saved = localStorage.getItem('rubik_settings');
            if(saved) settings = { ...settings, ...JSON.parse(saved) };
            
            document.getElementById('set-inspect').checked = settings.inspect;
            document.getElementById('set-hide-timer').checked = settings.hideTimer;
            document.getElementById('set-idle-anim').checked = settings.idleAnim;
            document.getElementById('set-bg-color').value = settings.bgColor;
            document.getElementById('set-text-color').value = settings.textColor;
            document.getElementById('set-accent-color').value = settings.accentColor;
            
            applyTheme();
        }

        function saveSettings() {
            settings.inspect = document.getElementById('set-inspect').checked;
            settings.hideTimer = document.getElementById('set-hide-timer').checked;
            settings.idleAnim = document.getElementById('set-idle-anim').checked;
            settings.bgColor = document.getElementById('set-bg-color').value;
            settings.textColor = document.getElementById('set-text-color').value;
            settings.accentColor = document.getElementById('set-accent-color').value;
            localStorage.setItem('rubik_settings', JSON.stringify(settings));
            applyTheme();
        }

        function applyTheme() {
            const root = document.documentElement;
            root.style.setProperty('--bg-color', settings.bgColor);
            root.style.setProperty('--text-color', settings.textColor);
            root.style.setProperty('--accent-color', settings.accentColor);
            if(settings.idleAnim && state === 'IDLE') timerEl.classList.add('idle-anim');
            else timerEl.classList.remove('idle-anim');
        }

        // --- SCRAMBLE GENERATOR ---
        function generateScramble() {
            const moves = ['U', 'D', 'L', 'R', 'F', 'B'];
            const modifiers = ['', "'", '2'];
            let scramble = [];
            let lastAxis = -1, prevAxis = -1;
            const length = Math.floor(Math.random() * 3) + 20; // 20-22 bước
            
            for(let i=0; i<length; i++) {
                let axis, move;
                do {
                    move = Math.floor(Math.random() * 6);
                    axis = Math.floor(move / 2);
                } while (axis === lastAxis || (axis === prevAxis && Math.floor(lastAxis/2) === axis));
                
                prevAxis = lastAxis;
                lastAxis = axis;
                scramble.push(moves[move] + modifiers[Math.floor(Math.random() * 3)]);
            }
            return scramble.join(' ');
        }
        let currentScramble = generateScramble();
        scrambleDisplay.innerText = currentScramble;

        // --- TIMER STATE MACHINE ---
        // States: IDLE -> INSPECTING -> HOLDING (Ready to start) -> SOLVING -> FINISHED
        let state = 'IDLE'; 
        let timerInterval, inspectInterval;
        let startTime = 0, inspectStartTime = 0;
        let currentInspectTime = 15;
        let isHolding = false;
        let penalty = 0; // 0: no, 2: +2, -1: DNF

        // --- LƯU TRỮ LỊCH SỬ ---
        let solves = JSON.parse(localStorage.getItem('rubik_history')) || [];

        function formatTime(ms) {
            if(ms === -1 || ms === Infinity || isNaN(ms)) return "DNF";
            let d = new Date(ms);
            let m = d.getUTCMinutes();
            let s = d.getUTCSeconds();
            let milli = Math.floor(d.getUTCMilliseconds() / 10);
            milli = milli < 10 ? '0'+milli : milli;
            if (m > 0) return `${m}:${s < 10 ? '0'+s : s}.${milli}`;
            return `${s}.${milli}`;
        }

        // Tính trung bình WCA (bỏ 1 tốt nhất, 1 tệ nhất)
        function calcAverage(n) {
            if (solves.length < n) return '-';
            let recent = solves.slice(0, n);
            let times = recent.map(s => s.penalty === -1 ? Infinity : s.time + (s.penalty === 2 ? 2000 : 0));
            let dnfs = times.filter(t => t === Infinity).length;
            if (dnfs > 1) return 'DNF';
            
            times.sort((a, b) => a - b);
            times.pop(); // bỏ tệ nhất (hoặc DNF)
            times.shift(); // bỏ tốt nhất
            
            let sum = times.reduce((a,b) => a+b, 0);
            return formatTime(sum / (n - 2));
        }

        function updateStats() {
            let validSolves = solves.filter(s => s.penalty !== -1).map(s => s.time + (s.penalty === 2 ? 2000 : 0));
            statsObj.count.innerText = solves.length;
            statsObj.best.innerText = validSolves.length ? formatTime(Math.min(...validSolves)) : '-';
            statsObj.ao5.innerText = calcAverage(5);
            statsObj.ao12.innerText = calcAverage(12);
        }

        function renderHistory() {
            historyList.innerHTML = '';
            solves.slice().reverse().forEach((solve, index) => {
                let actualIndex = solves.length - index;
                let displayTime = formatTime(solve.time);
                if(solve.penalty === 2) displayTime += "+";
                if(solve.penalty === -1) displayTime = "DNF";

                let li = document.createElement('li');
                li.className = 'history-item';
                li.title = solve.scramble; // Hover hiện scramble
                
                // Content hiển thị
                li.innerHTML = `
                    <div class="h-index">${actualIndex}</div>
                    <div class="h-time">${displayTime}</div>
                    <div class="h-ao5">${solve.ao5 || '-'}</div>
                    <div class="h-ao12">${solve.ao12 || '-'}</div>
                `;

                // Tạo nút sửa xoá khi click vào
                li.onclick = () => {
                    // Nếu đã có nút actions thì toggle ẩn/hiện, nếu chưa thì tạo
                    if(li.querySelector('.history-actions')) {
                        li.querySelector('.history-actions').remove();
                        li.querySelector('.h-time').style.display = 'block';
                    } else {
                        let actDiv = document.createElement('div');
                        actDiv.className = 'history-actions';
                        actDiv.innerHTML = `
                            <button onclick="modifySolve(${actualIndex-1}, 'ok', event)">OK</button>
                            <button onclick="modifySolve(${actualIndex-1}, '+2', event)">+2</button>
                            <button onclick="modifySolve(${actualIndex-1}, 'dnf', event)">DNF</button>
                            <button class="btn-del" onclick="modifySolve(${actualIndex-1}, 'del', event)">🗑️</button>
                        `;
                        li.querySelector('.h-time').style.display = 'none';
                        li.insertBefore(actDiv, li.querySelector('.h-ao5'));
                    }
                }
                historyList.appendChild(li);
            });
            updateStats();
            localStorage.setItem('rubik_history', JSON.stringify(solves));
        }

        window.modifySolve = function(index, action, e) {
            e.stopPropagation();
            if(action === 'del') solves.splice(index, 1);
            else if(action === 'ok') solves[index].penalty = 0;
            else if(action === '+2') solves[index].penalty = 2;
            else if(action === 'dnf') solves[index].penalty = -1;
            
            // Recalculate averages for subsequent solves
            for(let i = index; i < solves.length; i++) {
                solves[i].ao5 = i >= 4 ? calcAverageArray(solves.slice(i-4, i+1)) : '-';
                solves[i].ao12 = i >= 11 ? calcAverageArray(solves.slice(i-11, i+1)) : '-';
            }
            renderHistory();
        }

        function calcAverageArray(arr) {
            let times = arr.map(s => s.penalty === -1 ? Infinity : s.time + (s.penalty === 2 ? 2000 : 0));
            let dnfs = times.filter(t => t === Infinity).length;
            if (dnfs > 1) return 'DNF';
            times.sort((a,b) => a-b);
            times.pop(); times.shift();
            return formatTime(times.reduce((a,b)=>a+b,0) / (arr.length - 2));
        }

        // --- CORE TIMER LOGIC ---
        function setTimerDisplay(text) { timerEl.innerText = text; }

        function hideUI() {
            uiWrapper.classList.remove('fade-in-up');
            uiWrapper.classList.add('hidden-instant');
            timerEl.classList.remove('idle-anim');
            timerEl.classList.remove('pb-anim');
            if(settings.hideTimer) setTimerDisplay('...');
        }

        function showUI() {
            uiWrapper.classList.remove('hidden-instant');
            uiWrapper.classList.add('fade-in-up');
            if(settings.idleAnim) timerEl.classList.add('idle-anim');
        }

        function startInspect() {
            state = 'INSPECTING';
            hideUI();
            currentInspectTime = 15;
            penalty = 0;
            setTimerDisplay(currentInspectTime);
            inspectStartTime = performance.now();
            
            inspectInterval = setInterval(() => {
                let elapsed = Math.floor((performance.now() - inspectStartTime) / 1000);
                currentInspectTime = 15 - elapsed;
                
                if (currentInspectTime > 3 && currentInspectTime <= 15) {
                    setTimerDisplay(currentInspectTime);
                    timerEl.className = '';
                } else if (currentInspectTime > 0 && currentInspectTime <= 3) {
                    setTimerDisplay(currentInspectTime);
                    timerEl.className = 'state-warning';
                } else if (currentInspectTime <= 0 && currentInspectTime >= -1) {
                    setTimerDisplay("+2");
                    timerEl.className = 'state-red';
                    penalty = 2;
                } else if (currentInspectTime < -1) {
                    setTimerDisplay("DNF");
                    penalty = -1;
                    clearInterval(inspectInterval);
                    state = 'IDLE';
                    showUI();
                }
            }, 100);
        }

        function startTimer() {
            state = 'SOLVING';
            timerEl.className = '';
            if(settings.hideTimer) setTimerDisplay('...');
            startTime = performance.now();
            timerInterval = setInterval(() => {
                if(!settings.hideTimer) {
                    let elapsed = performance.now() - startTime;
                    setTimerDisplay(formatTime(elapsed));
                }
            }, 30); // 30ms update for smooth visually
        }

        function stopTimer() {
            clearInterval(timerInterval);
            let finalTime = performance.now() - startTime;
            state = 'FINISHED';
            
            let displayTime = formatTime(finalTime);
            if(penalty === 2) { displayTime += "+"; finalTime += 2000; }
            if(penalty === -1) { displayTime = "DNF"; }
            
            setTimerDisplay(displayTime);
            
            // PB Check
            let validSolves = solves.filter(s => s.penalty !== -1).map(s => s.time + (s.penalty === 2 ? 2000 : 0));
            let isPB = validSolves.length > 0 && penalty !== -1 && finalTime < Math.min(...validSolves);
            if(isPB) timerEl.classList.add('pb-anim');

            // Save Solve
            solves.push({
                time: penalty === -1 ? Infinity : finalTime - (penalty === 2 ? 2000 : 0),
                penalty: penalty,
                scramble: currentScramble,
                ao5: '-', ao12: '-' // Tạm thời
            });
            // Update average
            solves[solves.length-1].ao5 = calcAverage(5);
            solves[solves.length-1].ao12 = calcAverage(12);
            
            renderHistory();
            showUI();
            currentScramble = generateScramble();
            scrambleDisplay.innerText = currentScramble;

            setTimeout(() => { state = 'IDLE'; }, 500); // Ngăn double click
        }

        // EVENT HANDLERS
        function handleDown(e) {
            if(e.type === 'keydown' && e.code !== 'Space') {
                if(state === 'SOLVING') stopTimer();
                return;
            }
            if(e.type === 'keydown' && e.repeat) return;
            if(e.target.closest('#ui-wrapper') && e.target.tagName !== 'DIV' && state === 'IDLE') return; // Click vào nút/settings

            if (state === 'IDLE') {
                if(settings.inspect) {
                    startInspect();
                } else {
                    state = 'HOLDING';
                    hideUI();
                    timerEl.className = 'state-red';
                    setTimeout(() => { if(state === 'HOLDING') timerEl.className = 'state-green'; }, 300);
                }
            } else if (state === 'INSPECTING') {
                clearInterval(inspectInterval);
                state = 'HOLDING';
                timerEl.className = 'state-red';
                setTimeout(() => { if(state === 'HOLDING') timerEl.className = 'state-green'; }, 300);
            } else if (state === 'SOLVING') {
                stopTimer();
            }
        }

        function handleUp(e) {
            if(e.type === 'keyup' && e.code !== 'Space') return;
            
            if (state === 'HOLDING') {
                if (timerEl.classList.contains('state-green')) {
                    startTimer();
                } else {
                    // Nhả ra quá nhanh, quay lại IDLE hoặc Inspecting
                    state = 'IDLE';
                    timerEl.className = '';
                    showUI();
                    setTimerDisplay('0.00');
                }
            }
        }

        window.addEventListener('keydown', handleDown);
        window.addEventListener('keyup', handleUp);
        document.getElementById('timer-container').addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(e); }, {passive: false});
        document.getElementById('timer-container').addEventListener('touchend', (e) => { e.preventDefault(); handleUp(e); }, {passive: false});
        // Chuột trên PC
        document.getElementById('timer-container').addEventListener('mousedown', handleDown);
        document.getElementById('timer-container').addEventListener('mouseup', handleUp);

        // --- UI BINDINGS ---
        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').classList.add('active');
        document.getElementById('close-settings').onclick = () => { document.getElementById('settings-modal').classList.remove('active'); saveSettings(); };
        
        // Ngăn chặn sự kiện touch lan ra ngoài làm nổi settings khi đang giải
        document.getElementById('settings-modal').addEventListener('touchstart', e => e.stopPropagation());
        
        // INIT
        loadSettings();
        renderHistory();

    </script>
</body>
</html>
